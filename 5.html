<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Coffee</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>☕️ Coffee House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#menu">Menu</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- SLIDER -->
<section class="slider">
  <div class="slides">
    <div class="slide active">Best Coffee in Town</div>
    <div class="slide">Fresh Beans Everyday</div>
    <div class="slide">Relax & Enjoy</div>
  </div>
</section>

<!-- MENU -->
<section id="menu" class="menu">
  <h2>☕️ Menu</h2>
  <div class="menu-container">
    <div class="card">Espresso - $2</div>
    <div class="card">Latte - $3.5</div>
    <div class="card">Cappuccino - $3</div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="gallery">
  <h2>📸 Gallery</h2>
  <div class="images">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
    <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact</h2>
  <input type="text" placeholder="Your Name">
  <input type="email" placeholder="Your Email">
  <button onclick="showAlert()">Send</button>
</section>

<footer>
  <p>© 2026 Coffee House</p>
</footer>

<script src="script.js"></script>
</body>
</html>
